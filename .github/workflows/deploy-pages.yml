name: Build Portfolio Preview

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Export static site
        run: |
          chmod +x scripts/export-static.sh
          ./scripts/export-static.sh

      - name: Verify exported files
        run: |
          test -f dist/index.html
          test -f dist/404.html

      - name: Upload static preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-static-preview
          path: dist
